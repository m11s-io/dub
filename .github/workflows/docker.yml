name: Build and push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        env:
          DATABASE_URL: mysql://build:build@localhost/build
          NEXTAUTH_SECRET: build-placeholder-secret-32chars!!
          NEXTAUTH_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: --max-old-space-size=8192
          QSTASH_TOKEN: xx
          QSTASH_CURRENT_SIGNING_KEY: xx
          QSTASH_NEXT_SIGNING_KEY: xx
          TINYBIRD_API_KEY: xx
          TINYBIRD_API_URL: xx
          ANTHROPIC_API_KEY: xx
          STRIPE_SECRET_KEY: xx
          STRIPE_WEBHOOK_SECRET: xx
          CRON_SECRET: xx
          UPSTASH_REDIS_REST_URL: http://localhost:6379
          UPSTASH_REDIS_REST_TOKEN: xx
        run: pnpm turbo build --filter=web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          tags: |
            m11s/dub:latest
            m11s/dub:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
