name: Build and push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: build
          MYSQL_USER: build
          MYSQL_PASSWORD: build
          MYSQL_ROOT_PASSWORD: build
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ubuild -pbuild"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      # Node 22 LTS — dub has no engines constraint; Node 20 (used in upstream
      # playwright.yaml for test tooling) is deprecated on GitHub Actions runners.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create build-time env file
        run: |
          cat > apps/web/.env <<'EOF'
          DATABASE_URL=mysql://build:build@localhost/build
          NEXTAUTH_SECRET=build-placeholder-secret-32chars!!
          NEXTAUTH_URL=http://localhost:3000
          QSTASH_TOKEN=xx
          QSTASH_CURRENT_SIGNING_KEY=xx
          QSTASH_NEXT_SIGNING_KEY=xx
          TINYBIRD_API_KEY=xx
          TINYBIRD_API_URL=http://localhost:7181
          ANTHROPIC_API_KEY=sk-ant-api03-build-placeholder-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          STRIPE_SECRET_KEY=sk_test_build_placeholder
          STRIPE_APP_SECRET_KEY=sk_test_build_placeholder
          STRIPE_APP_SECRET_KEY_TEST=sk_test_build_placeholder
          STRIPE_APP_SECRET_KEY_SANDBOX=sk_test_build_placeholder
          STRIPE_WEBHOOK_SECRET=whsec_build_placeholder
          CRON_SECRET=xx
          AXIOM_TOKEN=axiom_build_placeholder
          AXIOM_DATASET=build
          PLAIN_API_KEY=plain_build_placeholder
          UPSTASH_REDIS_REST_URL=http://localhost:6379
          UPSTASH_REDIS_REST_TOKEN=xx
          UPSTASH_VECTOR_REST_URL=http://localhost:8080
          UPSTASH_VECTOR_REST_TOKEN=xx
          EOF

      - name: Prepare build database
        run: pnpm --filter web prisma:push

      - name: Build Next.js app
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: --max-old-space-size=8192
        run: pnpm turbo build --filter=web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          tags: |
            m11s/dub:latest
            m11s/dub:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile.migrate
          push: true
          tags: |
            m11s/dub-migrate:latest
            m11s/dub-migrate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
